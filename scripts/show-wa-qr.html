<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WhatsApp Web — отсканируйте QR</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 2rem; background: #111; color: #eee; }
    h1 { font-size: 1.2rem; }
    #qrcode { margin: 1.5rem auto; padding: 1rem; background: #fff; display: inline-block; border-radius: 8px; }
    #qrcode canvas { display: block; }
    p { font-size: 0.9rem; color: #999; }
  </style>
</head>
<body>
  <h1>Вход в WhatsApp Web</h1>
  <p>Откройте WhatsApp на телефоне → Настройки → Связанные устройства → Привязать устройство</p>
  <div id="qrcode"></div>
  <p>Отсканируйте QR-код камерой телефона</p>
  <script>
    (function() {
      var qr = "2@pvcocHgqm/HCVmI4SkElnKJOrSYDQWpMcbD7idVH4NVKZDq7ZhH/tvvGxMfOZOzB0q+J0tfmp6/V4BlcNh3XvB+g1hG28oO3N1w=,XfOl5Hm3Rm9SUVYw37lvJCX4HDWkuj0P4mGhbhju3zc=,FHAIg+Sjq1tmTBAPgBMPFZ1RWy5WiOB1P5+MqHaJCW0=,SJYhyWmBN8iRCbA5QrXxYi1cbcPzDVTEEwuLNgVx42Q=,1";
      if (qr && qr !== "2@pvcocHgqm/HCVmI4SkElnKJOrSYDQWpMcbD7idVH4NVKZDq7ZhH/tvvGxMfOZOzB0q+J0tfmp6/V4BlcNh3XvB+g1hG28oO3N1w=,XfOl5Hm3Rm9SUVYw37lvJCX4HDWkuj0P4mGhbhju3zc=,FHAIg+Sjq1tmTBAPgBMPFZ1RWy5WiOB1P5+MqHaJCW0=,SJYhyWmBN8iRCbA5QrXxYi1cbcPzDVTEEwuLNgVx42Q=,1") {
        QRCode.toCanvas(document.createElement("canvas"), qr, { width: 280, margin: 2 }, function(err, canvas) {
          if (!err) document.getElementById("qrcode").appendChild(canvas);
        });
      } else {
        document.getElementById("qrcode").innerHTML = "<p>Запустите скрипт get-wa-qr.sh и обновите страницу</p>";
      }
    })();
  </script>
</body>
</html>
